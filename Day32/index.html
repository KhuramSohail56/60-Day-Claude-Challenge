<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think Like a Marketing Strategist: Grow This Brand</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');

        :root {
            --bg-base: radial-gradient(circle at 50% 20%, #0c152b 0%, #02050d 100%);
            --panel-bg: rgba(13, 20, 38, 0.95);
            --border-neon: rgba(59, 130, 246, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --clr-blue: #3b82f6;
            --clr-purple: #8b5cf6;
            --clr-emerald: #10b981;
            --clr-rose: #f43f5e;
            --clr-amber: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Full Screen Width Setup to Remove Empty Corners */
        .wrapper {
            max-width: 1340px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* High GUI Premium Card from your Image Mockup */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-neon);
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 30px 65px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .step-slide-enter {
            animation: slideIn 0.4s ease-out forwards;
        }

        .header-widget {
            text-align: center;
            border-bottom: 2px solid var(--clr-blue);
            padding: 20px;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            border-radius: 16px;
        }

        .header-glow {
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.2rem;
            font-weight: 900;
        }

        .top-badge-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .top-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 900;
            padding: 5px 14px;
            border-radius: 20px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255,255,255,0.02);
            color: var(--text-muted);
        }

        /* Live Marketing Telemetry Systems */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            width: 100%;
        }

        .metric-tile {
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 18px;
        }

        .metric-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--clr-blue);
            transition: width 0.6s ease;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        /* Plain Simple Language Explanation Box (Matching Image Style) */
        .explain-box {
            background: rgba(59, 130, 246, 0.03);
            border-left: 4px solid var(--clr-blue);
            padding: 20px 24px;
            border-radius: 0 14px 14px 0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 28px;
            color: #e2e8f0;
        }

        /* Large Action Buttons (Continue Style) */
        .action-btn {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 18px 36px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(124, 58, 237, 0.5);
        }

        /* Selection Cards Framework (Bigger and Crystal Clear Text) */
        .choice-card {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.25s ease;
        }

        .choice-card:hover {
            border-color: var(--clr-blue);
            background: rgba(37, 99, 235, 0.04);
        }

        .choice-card.selected {
            border-color: var(--clr-emerald);
            background: rgba(16, 185, 129, 0.06);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
        }

        .choice-title {
            font-size: 19px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .choice-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .claude-prompt-card {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.05) 0%, rgba(124, 58, 237, 0.05) 100%);
            border: 1px dashed rgba(217, 119, 6, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
        }

        .prompt-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: #fcd34d;
            margin-top: 10px;
            white-space: pre-wrap;
            line-height: 1.5;
            border: 1px solid rgba(217, 119, 6, 0.1);
        }

        .step-indicator {
            font-size: 13px;
            color: var(--clr-emerald);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-label {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SCENARIOS = [
            { name: "Solvify SaaS", industry: "Software Platform", audience: "Remote team managers struggling with scheduling operations.", budget: "$1,500/month", competitors: "ClickUp, Monday.com", challenge: "Getting plenty of website visits but almost no one signs up for free trials." },
            { name: "Bean & Brew Co.", industry: "Artisanal Coffee", audience: "Young remote professionals looking for creative workspace environments.", budget: "$800/month", competitors: "Starbucks, local premium cafes", challenge: "Busy sales in the morning but completely empty seating slots in the afternoon." }
        ];

        function App() {
            const [stage, setStage] = useState('welcome'); // welcome, intake, audience, platforms, pillars, roadmap, event, report
            const [brandMode, setBrandMode] = useState(''); // business, personal
            const [brandData, setBrandData] = useState({ name: '', industry: '', audience: '', budget: '', competitors: '', challenge: '' });
            
            const [selectedPlatform, setSelectedPlatform] = useState('');
            const [selectedPillars, setSelectedPillars] = useState([]);
            const [eventChoice, setEventChoice] = useState(null);
            const [metrics, setMetrics] = useState({ reach: 30, authority: 30, traffic: 30, conversions: 30 });
            const [animKey, setAnimKey] = useState(0);

            const startMode = (mode) => {
                setBrandMode(mode);
                if (mode === 'random') {
                    const client = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
                    setBrandData(client);
                    setBrandMode('business');
                    setStage('audience');
                } else {
                    setStage('intake');
                }
                setAnimKey(prev => prev + 1);
            };

            const handleIntake = (e) => {
                e.preventDefault();
                setStage('audience');
                setAnimKey(prev => prev + 1);
            };

            const togglePillar = (id) => {
                if (selectedPillars.includes(id)) {
                    setSelectedPillars(selectedPillars.filter(p => p !== id));
                } else if (selectedPillars.length < 3) {
                    setSelectedPillars([...selectedPillars, id]);
                }
            };

            const getPlatforms = () => {
                if (brandMode === 'personal') {
                    return [
                        { id: 'linkedin', name: 'LinkedIn', weight: 'High', desc: 'The absolute best place for professionals. Perfect for sharing your story and network authority.', fx: { reach: 15, authority: 35, traffic: 15, conversions: 20 } },
                        { id: 'x', name: 'X / Twitter', weight: 'High', desc: 'Great for rapid networking, quick thoughts, and joining industry conversations quickly.', fx: { reach: 30, authority: 10, traffic: 15, conversions: 10 } },
                        { id: 'youtube', name: 'YouTube / Newsletters', weight: 'High', desc: 'Best for long-form educational value. Turns casual viewers into highly loyal fans.', fx: { reach: 10, authority: 30, traffic: 25, conversions: 30 } }
                    ];
                } else {
                    return [
                        { id: 'instagram', name: 'Instagram Reels', weight: 'High', desc: 'Essential to capture visual consumer attention and jump on short video trends.', fx: { reach: 35, authority: 10, traffic: 20, conversions: 15 } },
                        { id: 'linkedin', name: 'LinkedIn B2B', weight: 'Medium', desc: 'Highly valuable if you sell to managers or other corporate enterprises.', fx: { reach: 10, authority: 30, traffic: 10, conversions: 20 } },
                        { id: 'tiktok', name: 'TikTok Organic', weight: 'High', desc: 'Unbeatable algorithm for huge organic reach, but requires constant video production.', fx: { reach: 40, authority: 5, traffic: 20, conversions: 10 } }
                    ];
                }
            };

            const getPillars = () => {
                if (brandMode === 'personal') {
                    return [
                        { id: 'leadership', title: 'Thought Leadership', desc: 'Share your expert frameworks, opinions, and industry breakdowns to prove you know your niche.' },
                        { id: 'story', title: 'Personal Story', desc: 'Tell your journey, real career failures, and personal metrics to build human connection.' },
                        { id: 'bts', title: 'Behind the Scenes', desc: 'Show your daily workflow, tools setup, and what you are actively learning right now.' },
                        { id: 'education', title: 'Audience Education', desc: 'Give away step-by-step simple guides that solve a specific problem for free.' }
                    ];
                } else {
                    return [
                        { id: 'product', title: 'Product Authority', desc: 'Highlight how your solution works, product benefits, and clear validation metrics.' },
                        { id: 'proof', title: 'Social Proof', desc: 'Share customer transformations, reviews, and detailed case studies.' },
                        { id: 'edu', title: 'Industry Education', desc: 'Teach macro topics related to your industry to build trust with potential buyers.' }
                    ];
                }
            };

            const getMarketEvent = () => {
                if (brandMode === 'personal') {
                    return {
                        title: "⚡ Sudden Podcast Invitation!",
                        desc: "A well-known industry podcast invites you to speak live next week. However, the host is famous for putting guests on the spot with difficult, controversial questions.",
                        options: [
                            { text: "Accept immediately, fully sharing your honest and raw perspective.", feedback: "Amazing choice! Authentic answers build deep trust. Your visibility spikes and profile views surge.", isBest: true, fx: { reach: 35, authority: 20, conversions: 15 } },
                            { text: "Decline the invitation to focus safely on written content loops.", feedback: "Safe, but you missed a major organic leap to establish expert authority outside your immediate circle.", isBest: false, fx: { reach: -5, authority: 5, conversions: -5 } }
                        ]
                    };
                } else {
                    return {
                        title: "⚡ Competitor Calls You Out!",
                        desc: "A rival brand launches an ad campaign targeting your exact weak point to convince your clients to switch over.",
                        options: [
                            { text: "Publish a transparent case study proving your recent updates fixed the problem.", feedback: "Brilliant marketing strategy! An honest proof engine converts concerned prospects into loyal buyers.", isBest: true, fx: { authority: 35, traffic: 15, conversions: 30 } },
                            { text: "Launch a heavy discount model to win customers on price.", feedback: "Risky trap. Price wars destroy premium brand value and signal panic to the market.", isBest: false, fx: { reach: 10, authority: -15, conversions: 5 } }
                        ]
                    };
                }
            };

            return (
                <div class="wrapper">
                    {/* TOP EMBEDDED DASHBOARD HUD */}
                    <div class="glass-card header-widget">
                        <div class="top-badge-container">
                            <span class="top-badge">DAY 32 TASK</span>
                            <span class="top-badge" style={{borderColor: 'var(--clr-purple)', color: '#c084fc'}}>CLAUDE AI CHALLENGE</span>
                        </div>
                        <h1 class="cyber-title header-glow">Think Like a Marketing Strategist</h1>
                    </div>

                    {/* LIVE METRICS DISPLAY */}
                    {stage !== 'welcome' && (
                        <div class="metrics-grid">
                            <div class="metric-tile">
                                <div class="metric-meta"><span>Audience Reach</span><span>{metrics.reach}%</span></div>
                                <div class="progress-container"><div class="progress-bar" style={{ width: `${metrics.reach}%`, background: 'var(--clr-blue)' }}></div></div>
                            </div>
                            <div class="metric-tile">
                                <div class="metric-meta"><span>Brand Authority</span><span>{metrics.authority}%</span></div>
                                <div class="progress-container"><div class="progress-bar" style={{ width: `${metrics.authority}%`, background: 'var(--clr-purple)' }}></div></div>
                            </div>
                            <div class="metric-tile">
                                <div class="metric-meta"><span>Web Traffic</span><span>{metrics.traffic}%</span></div>
                                <div class="progress-container"><div class="progress-bar" style={{ width: `${metrics.traffic}%`, background: 'var(--clr-emerald)' }}></div></div>
                            </div>
                            <div class="metric-tile">
                                <div class="metric-meta"><span>Conversions</span><span>{metrics.conversions}%</span></div>
                                <div class="progress-container"><div class="progress-bar" style={{ width: `${metrics.conversions}%`, background: 'var(--clr-amber)' }}></div></div>
                            </div>
                        </div>
                    )}

                    {/* STAGE CHANNELS */}
                    {stage === 'welcome' && (
                        <div class="glass-card step-slide-enter">
                            <div class="step-indicator">Step 1: Choose Your Path</div>
                            <h2 class="choice-title" style={{fontSize: '24px', marginBottom: '12px'}}>Every strategy starts with knowing what you are promoting.</h2>
                            <p class="choice-desc mb-6" style={{fontSize: '16px'}}>Pick how you want to play the strategy module below:</p>
                            
                            <div class="grid-3 mb-6">
                                <div class="choice-card" onClick={() => startMode('business')}>
                                    <div style={{fontSize: '32px', marginBottom: '8px'}}>🏢</div>
                                    <div class="choice-title">Use My Own Business</div>
                                    <p class="choice-desc">Bring your real business or startup idea into the simulation.</p>
                                </div>
                                <div class="choice-card" onClick={() => startMode('personal')}>
                                    <div style={{fontSize: '32px', marginBottom: '8px'}}>🙋</div>
                                    <div class="choice-title">Build My Personal Brand</div>
                                    <p class="choice-desc">No business yet? Use your own name, story, and expertise instead.</p>
                                </div>
                                <div class="choice-card" onClick={() => startMode('random')}>
                                    <div style={{fontSize: '32px', marginBottom: '8px'}}>🎲</div>
                                    <div class="choice-title">A New Client Arrives</div>
                                    <p class="choice-desc">We will randomly generate a business profile for you to manage.</p>
                                </div>
                            </div>

                            <div class="explain-box">
                                <strong>Why this matters:</strong> Strategists always start with a clear subject. Whether it is a company, a random client, or you yourself, marketing decisions only make sense once you know exactly who or what you are growing.
                            </div>
                        </div>
                    )}

                    {stage === 'intake' && (
                        <div class="glass-card step-slide-enter" key={animKey}>
                            <div class="step-indicator">Profile Setup</div>
                            <h2 class="choice-title" style={{fontSize: '24px', marginBottom: '16px'}}>Configure Your Baseline Parameters</h2>
                            <form onSubmit={handleIntake} class="grid-2">
                                <div style={{display: 'flex', flexDirection: 'column', gap: '6px'}}>
                                    <label class="input-label">Identity Name:</label>
                                    <input type="text" required value={brandData.name} onChange={e => setBrandData({...brandData, name: e.target.value})} placeholder="e.g., Khuram Sohail" class="input-field" />
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '6px'}}>
                                    <label class="input-label">Niche Industry:</label>
                                    <input type="text" required value={brandData.industry} onChange={e => setBrandData({...brandData, industry: e.target.value})} placeholder="e.g., Java & Software Engineering" class="input-field" />
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '6px', gridColumn: '1 / -1'}}>
                                    <label class="input-label">Target Audience Profile:</label>
                                    <input type="text" required value={brandData.audience} onChange={e => setBrandData({...brandData, audience: e.target.value})} placeholder="e.g., Tech recruiters and startup managers seeking backend engineering interns." class="input-field" />
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '6px', gridColumn: '1 / -1'}}>
                                    <label class="input-label">Primary Challenge / Bottleneck:</label>
                                    <input type="text" required value={brandData.challenge} onChange={e => setBrandData({...brandData, challenge: e.target.value})} placeholder="e.g., High views on my profile, but low conversion into actual internship offers." class="input-field" />
                                </div>
                                <button type="submit" class="action-btn mt-4" style={{gridColumn: '1 / -1'}}>Lock Framework & Continue ➔</button>
                            </form>
                        </div>
                    )}

                    {stage === 'audience' && (
                        <div class="glass-card step-slide-enter" key={animKey}>
                            <div class="step-indicator">Phase 2: Target Audience</div>
                            <h2 class="choice-title" style={{fontSize: '24px'}}>Understanding the Mindset of Your Audience</h2>
                            <p class="choice-desc mb-4">Targeting Framework Built For: <strong>{brandData.name}</strong></p>

                            <div class="explain-box">
                                <strong>What is this?</strong> Breaking down exactly who needs your help, what problems keep them up at night, and what roadblocks prevent them from purchasing or hiring.<br/>
                                <strong>Why it matters:</strong> If you do not map out audience friction first, your marketing content stays broad, boring, and fails to convince anyone.
                            </div>

                            <div class="grid-2 mb-6 text-sm bg-slate-950/40 p-4 rounded-xl border border-white/5">
                                <div>🎯 <strong>Core Value Asset:</strong> {brandMode === 'personal' ? 'Your technical software knowledge, personal projects journey, and lived experience.' : `Tailored products built to solve: ${brandData.challenge}`}</div>
                                <div class="mt-2 md:mt-0">👥 <strong>Audience Roadblock:</strong> {brandData.audience}</div>
                            </div>

                            <div class="claude-prompt-card">
                                <h4 class="choice-title" style={{fontSize: '15px', color: '#f59e0b'}}>🗣️ Claude Prompt Engineering Shortcut Card:</h4>
                                <div class="prompt-text">
{brandMode === 'personal'
? `Act as an expert brand strategist. Map out an detailed target profile for a Personal Brand named "${brandData.name}" who specializes in "${brandData.industry}". Give me their top 3 core fears, professional problems, and a perfect tagline bio for LinkedIn conversions.`
: `Act as a senior growth marketer. Build a complete customer profile avatar for "${brandData.name}" in the "${brandData.industry}" sector. Analyze why customers hit this exact bottleneck: "${brandData.challenge}".`}
                                </div>
                            </div>

                            <button onClick={() => { setStage('platforms'); setAnimKey(prev => prev + 1); }} class="action-btn w-full mt-6">Continue to Platform Strategy ➔</button>
                        </div>
                    )}

                    {stage === 'platforms' && (
                        <div class="glass-card step-slide-enter" key={animKey}>
                            <div class="step-indicator">Phase 3: Platform Match</div>
                            <h2 class="choice-title" style={{fontSize: '24px'}}>Where is Your Target Audience Looking?</h2>
                            
                            <div class="explain-box">
                                <strong>What is this?</strong> Picking the channels where your audience is already hanging out and actively searching for solutions.<br/>
                                <strong>Why it matters:</strong> Trying to push professional engineering services on entertainment video apps or local products on business text feeds wastes time and budget.
                            </div>

                            <p class="choice-desc mb-4 font-bold">Select your primary distribution channel:</p>
                            <div class="grid-2 mb-6">
                                {getPlatforms().map(p => (
                                    <div key={p.id} class={`choice-card ${selectedPlatform === p.id ? 'selected' : ''}`} onClick={() => {
                                        setSelectedPlatform(p.id);
                                        setMetrics(prev => ({
                                            reach: Math.min(100, prev.reach + p.fx.reach),
                                            authority: Math.min(100, prev.authority + p.fx.authority),
                                            traffic: Math.min(100, prev.traffic + p.fx.traffic),
                                            conversions: Math.min(100, prev.conversions + p.fx.conversions)
                                        }));
                                    }}>
                                        <div class="choice-title" style={{fontSize: '17px'}}>{p.name} <span style={{fontSize: '11px', color: 'var(--clr-amber)'}}>({p.weight} Priority)</span></div>
                                        <p class="choice-desc mt-1">{p.desc}</p>
                                    </div>
                                ))}
                            </div>

                            <button onClick={() => {
                                if(!selectedPlatform) { alert("Please click and choose a platform card to continue."); return; }
                                setStage('pillars'); setAnimKey(prev => prev + 1);
                            }} class="action-btn w-full">Continue to Content Pillars ➔</button>
                        </div>
                    )}

                    {stage === 'pillars' && (
                        <div class="glass-card step-slide-enter" key={animKey}>
                            <div class="step-indicator">Phase 4: Content Pillars</div>
                            <h2 class="choice-title" style={{fontSize: '24px'}}>Isolate Exactly Three Main Content Pillars</h2>
                            
                            <div class="explain-box">
                                <strong>What is this?</strong> The 3 core topics you will post about regularly. This sets a clear theme so your profile stays organized and recognizable.<br/>
                                <strong>Why it matters:</strong> Posting random things keeps your brand confusing. Choosing 3 steady topics builds domain authority.
                            </div>

                            <p class="choice-desc mb-3 font-bold">Select exactly THREE content themes (Selected: {selectedPillars.length} / 3):</p>
                            <div class="grid-2 mb-6">
                                {getPillars().map(p => (
                                    <div key={p.id} class={`choice-card ${selectedPillars.includes(p.id) ? 'selected' : ''}`} onClick={() => togglePillar(p.id)}>
                                        <div class="choice-title" style={{fontSize: '17px'}}>{p.title}</div>
                                        <p class="choice-desc mt-1">{p.desc}</p>
                                    </div>
                                ))}
                            </div>

                            <button onClick={() => {
                                if(selectedPillars.length !== 3) { alert("Please select exactly 3 pillars to balance your messaging layout."); return; }
                                setStage('roadmap'); setAnimKey(prev => prev + 1);
                            }} class="action-btn w-full">Generate 30-Day Content Roadmap ➔</button>
                        </div>
                    )}

                    {stage === 'roadmap' && (
                        <div class="glass-card step-slide-enter" key={animKey}>
                            <div class="step-indicator">Phase 5: Operational Roadmap</div>
                            <h2 class="choice-title" style={{fontSize: '24px'}}>Your 30-Day Strategy View</h2>

                            <div class="explain-box">
                                <strong>What is this?</strong> A high-level macro view showing weekly campaign themes instead of worrying about daily single posts.<br/>
                                <strong>Why it matters:</strong> Planning week by week keeps your business goal-oriented and stops you from feeling overwhelmed by daily content creation.
                            </div>

                            <div class="flex flex-col gap-3 mb-6 text-sm">
                                <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderLeft: '4px solid var(--clr-blue)', borderRadius: '0 8px 8px 0'}}>
                                    <strong>Week 1: Setup Profile & Clarity</strong> — {brandMode === 'personal' ? 'Optimize your bio fields, tag frameworks, and list your direct skill points POV clearly.' : `Audit landing pages to prevent: ${brandData.challenge}`}
                                </div>
                                <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderLeft: '4px solid var(--clr-purple)', borderRadius: '0 8px 8px 0'}}>
                                    <strong>Week 2: Deliver Free High Value</strong> — Publish diagnostic tools, breakdown system summaries, and actionable tutorials to show capability.
                                </div>
                                <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderLeft: '4px solid var(--clr-amber)', borderRadius: '0 8px 8px 0'}}>
                                    <strong>Week 3: Action Conversion Triggers</strong> — Share direct client transformation case summaries and invite warm prospects to book direct review syncs.
                                </div>
                                <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderLeft: '4px solid var(--clr-emerald)', borderRadius: '0 8px 8px 0'}}>
                                    <strong>Week 4: Track Analytics Logs</strong> — Audit your high-performing metrics, drop unengaging formats, and double-down on winning hooks.
                                </div>
                            </div>

                            <button onClick={() => { setStage('event'); setAnimKey(prev => prev + 1); }} class="action-btn w-full">Trigger Sudden Market Disruption ➔</button>
                        </div>
                    )}

                    {stage === 'event' && (() => {
                        const evt = getMarketEvent();
                        return (
                            <div class="glass-card step-slide-enter" key={animKey}>
                                <div class="step-indicator">Phase 6: Crisis Lab</div>
                                <h2 class="choice-title" style={{fontSize: '24px', color: 'var(--clr-amber)'}}>{evt.title}</h2>
                                <p class="choice-desc mb-6" style={{fontSize: '16px'}}>{evt.desc}</p>

                                <div class="explain-box">
                                    <strong>What is this step?</strong> Real business marketing changes fast. Sudden viral attention, copycats, or rival competitive attacks force you to adjust your strategy under pressure.<br/>
                                    <strong>Why it matters:</strong> Your fast response dictates whether your audience gains massive trust in you or moves away to other spaces.
                                </div>

                                <p class="choice-desc mb-3 font-bold">Pick your strategy response:</p>
                                <div class="flex flex-col gap-3">
                                    {evt.options.map((opt, idx) => (
                                        <div key={idx} class="choice-card" onClick={() => {
                                            setEventChoice(opt);
                                            setMetrics(prev => ({
                                                reach: Math.min(100, Math.max(10, prev.reach + (opt.fx.reach || 0))),
                                                authority: Math.min(100, Math.max(10, prev.authority + (opt.fx.authority || 0))),
                                                traffic: Math.min(100, Math.max(10, prev.traffic + (opt.fx.traffic || 0))),
                                                conversions: Math.min(100, Math.max(10, prev.conversions + (opt.fx.conversions || 0)))
                                            }));
                                        }}>
                                            <div class="choice-title" style={{fontSize: '16px'}}>➔ {opt.text}</div>
                                        </div>
                                    ))}
                                </div>

                                {eventChoice && (
                                    <div style={{marginTop: '20px', padding: '16px', background: 'rgba(16, 185, 129, 0.05)', border: '1px solid var(--clr-emerald)', borderRadius: '12px', fontSize: '14px'}}>
                                        <strong>Operational Consequence:</strong> {eventChoice.feedback}
                                    </div>
                                )}

                                <button onClick={() => {
                                    if(!eventChoice) { alert("Please pick an adaptive response track to trigger final reports."); return; }
                                    setStage('report'); setAnimKey(prev => prev + 1);
                                }} class="action-btn w-full mt-6">Compile Strategy Growth Report ➔</button>
                            </div>
                        );
                    })()}

                    {stage === 'report' && (() => {
                        const score = calculateFinalScore();
                        return (
                            <div class="glass-card step-slide-enter">
                                <div class="step-indicator">Final Output Scorecard</div>
                                <h2 class="choice-title" style={{fontSize: '26px', textAlign: 'center'}}>Strategic Marketing Growth Report</h2>
                                <p class="choice-desc text-center mb-6">Evaluated Profile Niche: {brandData.name} ({brandData.industry})</p>

                                <div class="text-center mb-6">
                                    <div class="cyber-title text-blue-400" style={{fontSize: '44px', fontWeight: '900'}}>{score} / 100</div>
                                    <span class="choice-desc font-bold uppercase tracking-wider text-slate-400">Strategy Execution Level</span>
                                </div>

                                <div class="grid-2 gap-4 mb-6 text-sm">
                                    <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderRadius: '12px', border: '1px solid var(--border-neon)'}}>
                                        <h4 class="choice-title" style={{fontSize: '14px', color: 'var(--clr-emerald)'}}>✓ Best Strategic Move</h4>
                                        <p class="choice-desc mt-1">{eventChoice?.isBest ? "You handled market volatility perfectly by deploying transparent, update-backed educational proof modules instead of panic discounts." : "You kept operations safe but missed a major opportunity to scale your distinct brand authority."}</p>
                                    </div>
                                    <div style={{padding: '16px', background: 'rgba(255,255,255,0.02)', borderRadius: '12px', border: '1px solid var(--border-neon)'}}>
                                        <h4 class="choice-title" style={{fontSize: '14px', color: 'var(--clr-rose)'}}>⚠ Key Marketing Danger Avoided</h4>
                                        <p class="choice-desc mt-1">{brandMode === 'personal' ? "Avoided posting random topics. Sticking strictly to three core themes forces the market algorithm to recognize your exact expertise." : "Avoided destructive price cutting battles which compromise product profit margins."}</p>
                                    </div>
                                </div>

                                <div class="explain-box" style={{borderColor: 'var(--clr-emerald)', background: 'rgba(16,185,129,0.01)'}}>
                                    <strong>🧠 Three Practical Lessons to Remember:</strong>
                                    <ul style={{marginTop: '8px', paddingLeft: '16px', display: 'flex', flexDirection: 'column', gap: '8px', fontSize: '14px'}}>
                                        <li>• <strong>1. Audience Before Tactics:</strong> Never write a post caption before fully mapping the psychological objections of your ideal persona.</li>
                                        <li>• <strong>2. Niche Focus Beats Volume:</strong> Staying highly consistent on exactly 3 content pillars protects your positioning from getting diluted.</li>
                                        <li>• <strong>3. Own Your Conversions Layer:</strong> Direct views mean nothing without an optimized landing framework or profile CTA mapping.</li>
                                    </ul>
                                </div>

                                <button onClick={resetEngine} class="action-btn w-full">↺ Restart Simulator / Try Different Brand Route</button>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
